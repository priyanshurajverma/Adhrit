version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: adhrit_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: adhrit_db
      MYSQL_USER: adhrit_user
      MYSQL_PASSWORD: adhrit_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: adhrit_backend
    environment:
      DATABASE_URL: mysql+pymysql://adhrit_user:adhrit_password@mysql:3306/adhrit_db
      CORS_ORIGINS: http://localhost:3000,http://localhost:8000,https://adhrittechnologies.in
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: adhrit_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mysql_data:
